<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Connexion</title>
</head>
<body>
  <main class="login-container">
    <section class="form-pannel">
      <div class="id-ux">
        <div class="form-title">Connexion</div>
        <h2>Connectez-vous</h2>
        <p class="form-subtitle">Accédez à votre espace ConSchool.</p>
        <div class="input-id">
            <label for="email">Adresse e-mail</label>
            <input id="email" type="email" placeholder="exemple@conschool.com">
            <label for="password">Mot de passe</label>
            <div class="password-wrap">
                <input id="password" type="password" placeholder="Votre mot de passe">
                <button type="button" class="password-toggle" aria-label="Afficher le mot de passe" data-target="password">
                    <i class="fa-regular fa-eye"></i>
                </button>
            </div>
            <a href="#password">mot de passe oublié?</a>
            <button class="btn-login">Se connecter</button>
            <p class="form-switch">
              Pas encore inscrit ?
              <a href="index.html">Retour à l’accueil</a>
            </p>
        </div>
      </div>
    </section>

    <section class="welcome-pannel">
        <div class="welcome-content">
            <h2>Ravis de te revoir</h2>
            <p>Heureux de vous retrouver sur votre espace ConSchool.</p>
            <div class="welcome-badge">Sécurisé • Rapide • Simple</div>
        </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
