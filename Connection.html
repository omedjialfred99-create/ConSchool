<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Connexion</title>
</head>
<body>
  <div class="brand-header" style="padding: 20px 24px 0 24px;">
    <a href="index.html" class="site-logo" aria-label="ConSchool">
      <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
        <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path>
      </svg>
      <div class="logo-text">Con<span class="logo-accent">School</span></div>
    </a>
  </div>
  <main class="login-container">
    <section class="form-pannel">

     <div class="id-ux">
        <h2>Connectez-vous</h2>
        <div class="input-id">
            <input id="email" type="email" placeholder="email">
            <input id="password" type="password" placeholder="password">
            <a href="#password">mot de passe oublié?</a>
            <button class="btn-login">Se connecter</button>
        </div>
     </div>
    </section>
    
    <section class="welcome-pannel">
        <div class="welcome-content">
            <h2>Ravis de te revoir</h2>
            <p>Heureux de vous retrouvez sur votre espace ConSchool.</p>
        </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
