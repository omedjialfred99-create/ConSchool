<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Page vitrine</title>
</head>
<body>
    <nav>
        <div class="logo">
            <h1>ConSchool</h1>
        </div>

        <ul class="nav-items">
            <li><button class="btn" type="button" id="connect-btn">Se connecter</button></li>
        </ul>
    </nav>

    <form>
        <section class="accueil">
            <h1>Bienvenue sur ConSchool</h1>
            <p>ConSchool est une plateforme de gestion scolaire conçue pour simplifier les tâches administratives et améliorer l'expérience éducative. Notre solution tout-en-un offre
                 des fonctionnalités avancées pour la gestion financiaire des étudiants.</p>
            <br>
            <button class="btn" type="button" id="discover-btn">Découvrez nos services</button>
            <div class="imag-container">
                 <img src="schoolimge.png" alt="Image du tableau de board" width="100%" height="400px" style="text-align: center; padding: 10px; margin: 10px;" >
            </div>
        </section>
    </form>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const connectBtn = document.getElementById('connect-btn');
            const discoverBtn = document.getElementById('discover-btn');

            if (connectBtn) {
                connectBtn.addEventListener('click', () => {
                    window.location.href = 'Connection.html';
                });
            }

            if (discoverBtn) {
                discoverBtn.addEventListener('click', () => {
                    window.location.href = 'decouvert.html';
                });
            }
        });
    </script>
</body>
</html>
